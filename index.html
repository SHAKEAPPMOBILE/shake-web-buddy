    <script>
      (function() {
        var theme = localStorage.getItem('shake_theme');
        if (theme === 'dark') {
          document.documentElement.classList.remove('light');
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <div id="root"></div>
